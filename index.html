<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #0B6E63; --primary-dk: #0A3D38; --primary-lt: rgba(11,110,99,.09);
  --bg: #F4F1EB; --surface: #fff; --border: #E8E3DA; --border-lt: #F0EDE6;
  --text: #1A1A1A; --t2: #6B7280; --t3: #9CA3AF;
  --sidebar-w: 224px; --panel-w: 348px; --top-h: 58px;
  --r: 10px; --r-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 14px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
}
html, body { height: 100%; font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; color: var(--text); background: var(--bg); overflow: hidden; }

/* ── LAYOUT ─────────────────────────────── */
#app { display: flex; height: 100vh; }

/* ── SIDEBAR ─────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: linear-gradient(165deg, #09302C 0%, #0C7A6E 100%);
  display: flex; flex-direction: column; overflow: hidden; z-index: 10;
}
.sb-logo {
  padding: 20px 18px 16px; display: flex; align-items: center; gap: 11px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sb-logo-icon {
  width: 37px; height: 37px; border-radius: 10px;
  background: rgba(255,255,255,.14); display: flex; align-items: center;
  justify-content: center; font-family: 'DM Serif Display', serif;
  font-size: 19px; color: #fff; flex-shrink: 0;
}
.sb-logo-name { font-family: 'DM Serif Display', serif; font-size: 18px; color: #fff; line-height: 1.1; }
.sb-logo-sub { font-size: 9.5px; color: rgba(255,255,255,.4); letter-spacing: .9px; text-transform: uppercase; }
.sb-nav { padding: 10px 10px 0; flex: 1; }
.sb-section-label { font-size: 9px; color: rgba(255,255,255,.28); text-transform: uppercase; letter-spacing: 1.1px; font-weight: 700; padding: 12px 10px 5px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: var(--r-sm); color: rgba(255,255,255,.62); font-size: 12.5px;
  font-weight: 500; cursor: pointer; transition: background .13s, color .13s;
  user-select: none; margin-bottom: 2px;
}
.nav-item:hover { background: rgba(255,255,255,.09); color: rgba(255,255,255,.9); }
#btn-signout:hover { background: rgba(255,255,255,.13); color: rgba(255,255,255,.9); }
.nav-item.active { background: rgba(255,255,255,.16); color: #fff; font-weight: 600; }
.nav-item svg { flex-shrink: 0; }
.sb-footer {
  margin: 10px; border-radius: 8px;
  background: rgba(0,0,0,.18); padding: 10px 13px;
}
.sb-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.sb-stat-row span { font-size: 10.5px; color: rgba(255,255,255,.5); }
.sb-stat-row strong { font-size: 11px; color: rgba(255,255,255,.85); font-weight: 600; }

/* ── MAIN ─────────────────────────────────── */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
  transition: margin-right .22s ease;
}
#main.panel-open { margin-right: var(--panel-w); }

/* ── TOPBAR ──────────────────────────────── */
#topbar {
  height: var(--top-h); flex-shrink: 0; background: var(--surface);
  border-bottom: 1px solid var(--border); display: flex; align-items: center;
  padding: 0 26px; gap: 10px; box-shadow: var(--shadow);
}
#page-title { font-size: 17px; font-weight: 700; flex: 1; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--t3); pointer-events: none; }
#search-input {
  padding: 7px 11px 7px 30px; border-radius: var(--r-sm);
  border: 1px solid var(--border); font-family: inherit; font-size: 12px;
  background: var(--bg); color: var(--text); outline: none; width: 210px;
  transition: border-color .15s, box-shadow .15s;
}
#search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-lt); }
#search-input::placeholder { color: var(--t3); }
.f-select {
  padding: 7px 9px; border-radius: var(--r-sm); border: 1px solid var(--border);
  font-family: inherit; font-size: 12px; background: var(--surface); color: var(--text);
  outline: none; cursor: pointer; transition: border-color .15s;
}
.f-select:focus { border-color: var(--primary); }
.btn-clear { background: none; border: none; color: var(--primary); font-size: 11.5px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 4px 2px; }
.btn { padding: 8px 15px; border-radius: var(--r-sm); border: none; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .13s, box-shadow .13s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #0A5D54; box-shadow: 0 2px 8px rgba(11,110,99,.3); }
.btn-secondary { background: var(--bg); color: var(--t2); border: 1px solid var(--border); }
.btn-secondary:hover { background: #EDE9E0; color: var(--text); }
.btn-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FCA5A5; }
.btn-danger:hover { background: #FEE2E2; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.icon-btn {
  width: 28px; height: 28px; border-radius: var(--r-sm); background: none;
  border: 1px solid var(--border); color: var(--t2); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .13s;
}
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn.danger { color: #EF4444; border-color: #FCA5A5; }
.icon-btn.danger:hover { background: #FEF2F2; }

/* ── CONTENT ─────────────────────────────── */
#content { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }

/* ── KPI CARDS ────────────────────────────── */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
.kpi-card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 18px 20px; box-shadow: var(--shadow); }
.kpi-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
.kpi-val { font-size: 23px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
.kpi-label { font-size: 10.5px; color: var(--t2); text-transform: uppercase; letter-spacing: .65px; font-weight: 600; }

/* ── SECTION CARD ─────────────────────────── */
.card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); box-shadow: var(--shadow); }
.card-head { padding: 15px 20px; border-bottom: 1px solid var(--border-lt); display: flex; justify-content: space-between; align-items: center; }
.card-title { font-size: 13px; font-weight: 700; }
.card-body { padding: 16px 20px; }

/* ── FUNNEL ───────────────────────────────── */
.funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.funnel-lbl { width: 90px; font-size: 11px; font-weight: 600; color: var(--t2); text-align: right; flex-shrink: 0; }
.funnel-track { flex: 1; background: var(--bg); border-radius: 5px; height: 26px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 5px; transition: width .45s cubic-bezier(.4,0,.2,1); display: flex; align-items: center; min-width: 0; }
.funnel-fill span { font-size: 10.5px; font-weight: 700; color: #fff; padding: 0 9px; white-space: nowrap; }
.funnel-meta { width: 60px; font-size: 10.5px; color: var(--t3); text-align: right; flex-shrink: 0; }

/* ── ACTIVITY FEED ────────────────────────── */
.act-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-lt); cursor: pointer; }
.act-item:last-child { border-bottom: none; }
.act-item:hover .act-company { text-decoration: underline; }
.act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.act-company { font-weight: 600; font-size: 12px; }
.act-text { font-size: 12px; color: var(--t2); line-height: 1.4; }
.act-meta { font-size: 10.5px; color: var(--t3); margin-top: 2px; }

/* ── PIPELINE BOARD ───────────────────────── */
.board { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; align-items: flex-start; }
.board::-webkit-scrollbar { height: 4px; }
.col {
  min-width: 208px; width: 208px; flex-shrink: 0; background: var(--surface);
  border-radius: var(--r); border: 1.5px solid var(--border);
  display: flex; flex-direction: column; transition: border-color .15s, background .15s;
}
.col.drag-over { border-color: var(--primary); background: var(--primary-lt); }
.col-hd { padding: 11px 13px 9px; border-bottom: 1px solid var(--border-lt); }
.col-hd-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.col-hd-left { display: flex; align-items: center; gap: 7px; }
.stage-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-name { font-size: 12px; font-weight: 700; }
.col-cnt { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
.col-val { font-size: 10.5px; color: var(--t3); }
.col-body { padding: 7px; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: calc(100vh - 230px); min-height: 50px; }
.col-body::-webkit-scrollbar { width: 3px; }
.col-empty { font-size: 11.5px; color: var(--t3); text-align: center; padding: 26px 8px; font-weight: 500; }
.col-empty.hint { color: var(--primary); }

/* ── KANBAN CARD ──────────────────────────── */
.kcard {
  background: #FAFAF8; border: 1px solid #EEEBE4; border-radius: 8px;
  padding: 11px 12px; cursor: grab; user-select: none;
  transition: box-shadow .13s, transform .13s, border-color .13s;
}
.kcard:hover { box-shadow: 0 2px 10px rgba(0,0,0,.09); transform: translateY(-1px); border-color: var(--border); }
.kcard:active { cursor: grabbing; }
.kcard.sel { border-color: var(--primary); background: #EEF6F5; }
.kcard-co { font-size: 12.5px; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
.kcard-ct { font-size: 11px; color: var(--t3); margin-bottom: 8px; }
.kcard-ft { display: flex; justify-content: space-between; align-items: center; }
.kcard-val { font-size: 11px; font-weight: 700; color: var(--primary); }
.kcard-prod { font-size: 9.5px; color: var(--t3); background: var(--bg); padding: 2px 6px; border-radius: 3px; max-width: 108px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── LEADS TABLE ──────────────────────────── */
.tbl-wrap { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  text-align: left; padding: 10px 13px; font-size: 10.5px;
  text-transform: uppercase; letter-spacing: .6px; color: var(--t3);
  font-weight: 700; background: #FAFAF8; border-bottom: 1.5px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
.tbl th:hover { color: var(--t2); }
.tbl td { padding: 11px 13px; border-bottom: 1px solid var(--border-lt); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr { cursor: pointer; transition: background .1s; }
.tbl tbody tr:hover { background: #FAFAF8; }
.tbl tbody tr.sel { background: #EEF6F5; }
.td-co { font-weight: 600; font-size: 12.5px; }
.td-ct { font-size: 12px; color: var(--t2); }
.td-val { font-weight: 700; color: var(--primary); font-size: 12px; }
.td-dt { font-size: 11.5px; color: var(--t3); }
.row-acts { display: flex; gap: 4px; opacity: 0; transition: opacity .13s; }
.tbl tbody tr:hover .row-acts, .tbl tbody tr.sel .row-acts { opacity: 1; }

/* ── BADGE ────────────────────────────────── */
.badge { display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: .15px; white-space: nowrap; }

/* ── ANALYTICS ────────────────────────────── */
.a-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }

/* ── DETAIL PANEL ─────────────────────────── */
#panel {
  width: var(--panel-w); flex-shrink: 0; position: fixed; right: 0; top: 0; bottom: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
  transform: translateX(var(--panel-w)); transition: transform .22s ease;
  z-index: 8; box-shadow: -4px 0 24px rgba(0,0,0,.07);
}
#panel.open { transform: translateX(0); }
.p-hd { padding: 18px 20px 14px; border-bottom: 1px solid var(--border-lt); position: sticky; top: 0; background: var(--surface); z-index: 1; }
.p-co { font-size: 16px; font-weight: 700; margin-bottom: 3px; line-height: 1.25; }
.p-sub { font-size: 11.5px; color: var(--t2); margin-bottom: 10px; }
.p-badges { display: flex; gap: 5px; flex-wrap: wrap; }
.p-body { padding: 16px 20px; flex: 1; }
.p-sec { margin-bottom: 17px; }
.p-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .85px; color: var(--t3); font-weight: 700; margin-bottom: 5px; }
.p-val { font-size: 12.5px; }
.p-val a { color: var(--primary); text-decoration: none; }
.p-val a:hover { text-decoration: underline; }
.p-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 17px; }
.p-notes { font-size: 12px; color: var(--t2); line-height: 1.6; background: var(--bg); padding: 10px 13px; border-radius: var(--r-sm); }
.stage-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.stage-btn { font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid; background: var(--surface); cursor: pointer; font-family: inherit; font-weight: 600; transition: transform .13s, box-shadow .13s; }
.stage-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 7px rgba(0,0,0,.1); }
.act-form { display: flex; gap: 5px; margin-bottom: 13px; }
.act-type { width: 78px; flex-shrink: 0; }
.act-txt { flex: 1; }
.act-add { background: var(--primary); color: #fff; border: none; border-radius: var(--r-sm); padding: 0 12px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; flex-shrink: 0; height: 34px; transition: background .13s; }
.act-add:hover { background: #0A5D54; }
.timeline { display: flex; flex-direction: column; }
.tl-item { display: flex; gap: 10px; padding: 7px 0; border-top: 1px solid var(--border-lt); }
.tl-item:first-child { border-top: none; padding-top: 0; }
.tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.tl-text { font-size: 12px; color: var(--text); line-height: 1.45; }
.tl-meta { font-size: 10px; color: var(--t3); margin-top: 2px; }
.p-ft { padding: 14px 20px; border-top: 1px solid var(--border-lt); display: flex; gap: 8px; flex-shrink: 0; }

/* ── MODAL ────────────────────────────────── */
#modal-ov {
  position: fixed; inset: 0; background: rgba(0,0,0,.42);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity .18s;
}
#modal-ov.open { opacity: 1; pointer-events: all; }
#modal {
  background: var(--surface); border-radius: 13px; width: 530px;
  max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
  transform: translateY(10px); transition: transform .18s;
}
#modal-ov.open #modal { transform: translateY(0); }
.m-hd { padding: 22px 24px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-lt); }
.m-title { font-size: 16px; font-weight: 700; }
.m-close { background: none; border: none; font-size: 23px; cursor: pointer; color: var(--t3); line-height: 1; transition: color .13s; }
.m-close:hover { color: var(--text); }
.m-body { padding: 20px 24px; }
.m-ft { padding: 13px 24px 20px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border-lt); }

/* ── FORM ─────────────────────────────────── */
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.ff { grid-column: 1 / -1; }
.fl { display: flex; flex-direction: column; gap: 5px; }
.flbl { font-size: 10px; text-transform: uppercase; letter-spacing: .7px; color: var(--t3); font-weight: 700; }
.fi, .fs, .fta {
  padding: 8px 10px; border-radius: var(--r-sm); border: 1px solid var(--border);
  font-family: inherit; font-size: 12.5px; color: var(--text); background: var(--surface);
  outline: none; width: 100%; transition: border-color .15s, box-shadow .15s;
}
.fi:focus, .fs:focus, .fta:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-lt); }
.fta { resize: vertical; min-height: 72px; }

/* ── CONFIRM ──────────────────────────────── */
#cfm-ov {
  position: fixed; inset: 0; background: rgba(0,0,0,.42);
  display: flex; align-items: center; justify-content: center; z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
#cfm-ov.open { opacity: 1; pointer-events: all; }
#cfm {
  background: var(--surface); border-radius: 11px; padding: 26px 28px;
  width: 360px; box-shadow: var(--shadow-lg);
  transform: scale(.96); transition: transform .15s;
}
#cfm-ov.open #cfm { transform: scale(1); }
#cfm-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
#cfm-msg { font-size: 13px; color: var(--t2); line-height: 1.5; margin-bottom: 22px; }
.cfm-btns { display: flex; justify-content: flex-end; gap: 8px; }

/* ── EMPTY STATE ──────────────────────────── */
.empty { text-align: center; padding: 56px 20px; }
.empty svg { opacity: .25; margin-bottom: 14px; }
.empty-title { font-size: 14px; font-weight: 600; color: var(--t2); margin-bottom: 5px; }
.empty-sub { font-size: 12px; color: var(--t3); }

/* ── SCROLLBARS ───────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D5D0C8; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #bbb; }

/* ── TOAST ────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: #1A1A1A; color: #fff; font-size: 12.5px; font-weight: 500;
  padding: 10px 18px; border-radius: 8px; box-shadow: var(--shadow-lg);
  opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
  white-space: nowrap; z-index: 9999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LOADING ──────────────────────────────── */
#loading-ov { position:fixed;inset:0;background:rgba(255,255,255,.78);z-index:8000;display:none;align-items:center;justify-content:center; }
.spinner { width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── REPORTS ──────────────────────────────── */
.reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.report-card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; transition: box-shadow .15s, transform .15s; }
.report-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.report-card-body { padding: 20px 20px 14px; flex: 1; }
.report-card-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.report-card-desc { font-size: 12px; color: var(--t2); line-height: 1.55; margin-bottom: 13px; }
.report-count { display: inline-flex; align-items: center; font-size: 10.5px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
.report-card-foot { padding: 14px 20px; border-top: 1px solid var(--border-lt); display: flex; gap: 8px; }
.report-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; flex-shrink: 0; }

/* ── COLUMN PICKER ────────────────────────── */
#cp-ov { position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;pointer-events:none;transition:opacity .18s; }
#cp-ov.open { opacity:1;pointer-events:all; }
#cp { background:var(--surface);border-radius:13px;width:370px;max-height:82vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:translateY(10px);transition:transform .18s; }
#cp-ov.open #cp { transform:translateY(0); }
.cp-col-item { display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .1s;font-size:12.5px;user-select:none; }
.cp-col-item:hover { background:var(--bg); }
.cp-col-item input[type="checkbox"] { width:15px;height:15px;accent-color:var(--primary);cursor:pointer;flex-shrink:0; }

/* ── SIGN-IN GATE ─────────────────────────── */
#signin-gate { position:fixed;inset:0;background:linear-gradient(135deg,#09302C 0%,#0C7A6E 100%);display:none;align-items:center;justify-content:center;z-index:9999; }

function downloadExcel(filename, color, headers, rows) {
  const x = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const hdrCells = headers.map(h =>
    `<th style="background-color:${color};color:#fff;font-weight:bold;padding:9px 14px;border:1px solid ${color};font-size:13px;font-family:Arial,sans-serif;white-space:nowrap">${x(h)}</th>`
  ).join('');
  const bodyRows = rows.map((row, i) => {
    const bg = i % 2 === 0 ? '#ffffff' : '#F5F4F0';
    const cells = row.map(v =>
      `<td style="padding:7px 14px;border:1px solid #E8E3DA;background-color:${bg};font-size:12px;font-family:Arial,sans-serif;vertical-align:top">${x(v)}</td>`
    ).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Report</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table border="0" cellspacing="0" cellpadding="0" style="border-collapse:collapse"><thead><tr>${hdrCells}</tr></thead><tbody>${bodyRows}</tbody></table></body></html>`;
  const blob = new Blob(['\uFEFF' + html], {type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename + '.xls'; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

const EDGE_BASE = 'https://flpwzwctvtjoagqesyta.supabase.co/functions/v1';
const UserAdmin = {
  async _call(fn, method='GET', body=null) {
    const { data: { session } } = await db.auth.getSession();
    const res = await fetch(`${EDGE_BASE}/${fn}`, {
      method,
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
      ...(body ? { body: JSON.stringify(body) } : {})
    });
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || res.statusText);
    return res.json();
  },
  listUsers()          { return this._call('list-users'); },
  inviteUser(email)    { return this._call('invite-user', 'POST', { email }); },
  resetPassword(email) { return this._call('reset-user-password', 'POST', { email }); },
  deleteUser(userId)   { return this._call('delete-user', 'POST', { userId }); },
};

// ════════════════════════════════════════════
// STORE  (Supabase)
// ════════════════════════════════════════════
const Store = {
  leads: [],
  async load() {
    const [{ data: leadRows }, { data: actRows }] = await Promise.all([
      db.from('leads').select('*').order('created_at', { ascending: false }),
      db.from('activities').select('*').order('date', { ascending: false })
    ]);
    this.leads = (leadRows||[]).map(l => ({
      ...l, lastActivity: l.last_activity,
      activities: (actRows||[]).filter(a => a.lead_id === l.id)
    }));
  },
  async add(d) {
    const { data: lead } = await db.from('leads').insert({
      company: d.company, contact: d.contact||'', email: d.email||'',
      phone: d.phone||'', stage: d.stage||'New Lead',
      value: Number(d.value)||0, product: d.product||'',
      source: d.source||'', industry: d.industry||'',
      size: d.size||'', notes: d.notes||''
    }).select().single();
    await db.from('activities').insert({ lead_id: lead.id, date: today(), type: 'Note', text: 'Lead created.' });
    await this.load();
    return this.find(lead.id);
  },
  async update(d) {
    await db.from('leads').update({
      company: d.company, contact: d.contact||'', email: d.email||'',
      phone: d.phone||'', stage: d.stage, value: Number(d.value)||0,
      product: d.product||'', source: d.source||'',
      industry: d.industry||'', size: d.size||'', notes: d.notes||''
    }).eq('id', d.id);
    await this.load();
    return this.find(d.id);
  },
  async del(id) {
    await db.from('leads').delete().eq('id', id);
    this.leads = this.leads.filter(l => l.id !== id);
  },
  async move(id, stage) {
    const d = today();
    await Promise.all([
      db.from('leads').update({ stage, last_activity: d }).eq('id', id),
      db.from('activities').insert({ lead_id: id, date: d, type: 'Stage Change', text: `Moved to ${stage}.` })
    ]);
    await this.load();
    return this.find(id);
  },
  async addAct(id, type, text) {
    const d = today();
    await Promise.all([
      db.from('activities').insert({ lead_id: id, date: d, type, text }),
      db.from('leads').update({ last_activity: d }).eq('id', id)
    ]);
    await this.load();
    return this.find(id);
  },
  find(id) { return this.leads.find(l => l.id === id); }
};

const App = {
  view: 'dashboard', selId: null, dragId: null, isAdmin: false, currentUser: null,
  get sel() { return this.selId ? Store.find(this.selId) : null; },
  get filters() {
    return {
      q: ($('search-input')?.value||'').trim().toLowerCase(),
      stage: $('filter-stage')?.value||'All',
      product: $('filter-product')?.value||'All',
    };
  },
  get filtered() {
    const {q,stage,product} = this.filters;
    return Store.leads.filter(l => {
      if (stage!=='All' && l.stage!==stage) return false;
      if (product!=='All' && l.product!==product) return false;
      if (q && !l.company.toLowerCase().includes(q) && !l.contact.toLowerCase().includes(q) && !(l.email||'').toLowerCase().includes(q)) return false;
      return true;
    });
  }
};

function openColPicker(r) {
  const ov = $('cp-ov');

  colList.innerHTML = r.headers.map((h, i) => `
    <label class="cp-col-item">
      <input type="checkbox" class="cp-check" data-idx="${i}" checked>
      <span>${esc(h)}</span>
    </label>`).join('');
  ov.classList.add('open');
  const close = () => ov.classList.remove('open');
  $('cp-close').onclick = close;
  $('cp-cancel').onclick = close;
  ov.onclick = e => { if (e.target === ov) close(); };
  $('cp-sel-all').onclick = () => colList.querySelectorAll('.cp-check').forEach(c => c.checked = true);
  $('cp-sel-none').onclick = () => colList.querySelectorAll('.cp-check').forEach(c => c.checked = false);
  $('cp-download').onclick = () => {
    const picked = [...colList.querySelectorAll('.cp-check')].filter(c => c.checked).map(c => parseInt(c.dataset.idx));
    if (!picked.length) { showToast('Select at least one column'); return; }
    const hdrs = picked.map(i => r.headers[i]);
    const rows = r.rows().map(row => picked.map(i => row[i]));
    close();
    downloadExcel(`prospera-${r.id}-${today()}`, r.color, hdrs, rows);
    showToast(`Downloading ${r.title}…`);
  };
}

function initDrag() {
  document.querySelectorAll('.kcard').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      App.dragId=parseInt(card.dataset.id);
      e.dataTransfer.effectAllowed='move';
      requestAnimationFrame(()=>card.style.opacity='.3');
    });
    card.addEventListener('dragend',()=>{
      App.dragId=null; card.style.opacity='1';
      document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      col.classList.add('drag-over');
      const h=col.querySelector('.col-empty'); if(h) h.classList.add('hint');
    });
    col.addEventListener('dragleave',e=>{
      if(!col.contains(e.relatedTarget)){
        col.classList.remove('drag-over');
        const h=col.querySelector('.col-empty'); if(h) h.classList.remove('hint');
      }
    });
    col.addEventListener('drop',async e=>{
      e.preventDefault(); col.classList.remove('drag-over');
      if(App.dragId){ setLoading(true);await Store.move(App.dragId,col.dataset.col);setLoading(false);renderAll(); }
    });
  });
}

// CSV IMPORT
// ════════════════════════════════════════════
const CSV_MAP = {
  company:['company','company name','organization','org'],
  contact:['contact','contact name','full name','name','person'],
  email:['email','email address','e-mail'],
  phone:['phone','phone number','tel','telephone','mobile'],
  stage:['stage','lead stage','status'],
  value:['value','deal value','amount','revenue','arr'],
  product:['product','product line','service'],
  source:['source','lead source','channel'],
  industry:['industry','sector','vertical'],
  size:['size','company size','employees','headcount'],
  notes:['notes','note','description','comments']
};

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  // Parse header row — handle quoted fields
  const parseRow = row => {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    result.push(cur.trim()); return result;
  };
  const headers = parseRow(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9 ]/g,'').trim());
  // Map each header to a schema field
  const colMap = headers.map(h => {
    for (const [field, aliases] of Object.entries(CSV_MAP)) {
      if (aliases.includes(h)) return field;
    }
    return null;
  });
  const leads = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseRow(lines[i]);
    const obj = {};
    colMap.forEach((field, idx) => { if (field) obj[field] = (vals[idx]||'').trim(); });
    if (!obj.company) continue; // skip rows without a company name
    // Apply defaults for missing fields
    if (!obj.stage || !STAGES.includes(obj.stage)) obj.stage = 'New Lead';
    if (!obj.product || !PRODUCTS.includes(obj.product)) obj.product = PRODUCTS[0];
    if (!obj.source || !SOURCES.includes(obj.source)) obj.source = 'Cold Outreach';
    if (!obj.size || !SIZES.includes(obj.size)) obj.size = '1-10';
    obj.value = Number(obj.value) || 0;
    leads.push(obj);
  }
  return leads;
}

async function importLeads(rows) {
  const existing = new Set(Store.leads.map(l => l.company.toLowerCase().trim()));
  const toInsert = rows.filter(r => !existing.has(r.company.toLowerCase().trim()));
  const skipped = rows.length - toInsert.length;
  if (toInsert.length > 0) {
    const { data: inserted } = await db.from('leads').insert(
      toInsert.map(r => ({
        company: r.company, contact: r.contact||'', email: r.email||'',
        phone: r.phone||'', stage: r.stage, value: r.value,
        product: r.product, source: r.source, industry: r.industry||'',
        size: r.size, notes: r.notes||''
      }))
    ).select();
    if (inserted?.length) {
      await db.from('activities').insert(
        inserted.map(l => ({ lead_id: l.id, date: today(), type: 'Note', text: 'Lead imported via CSV.' }))
      );
    }
    await Store.load();
  }
  return { imported: toInsert.length, skipped };
}

  // Import CSV
  $('btn-import').addEventListener('click', () => $('csv-file').click());
  $('csv-file').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = parseCSV(ev.target.result);
      if (!rows.length) { showToast('No valid leads found in CSV'); return; }
      showConfirm(`Import ${rows.length} lead${rows.length!==1?'s':''}?`, async () => {
        setLoading(true);
        const { imported, skipped } = await importLeads(rows);
        setLoading(false);
        renderAll();
        showToast(`Imported ${imported} lead${imported!==1?'s':''}${skipped ? `, skipped ${skipped} duplicate${skipped!==1?'s':''}` : ''}`);
      }, 'Import', 'Import Leads');
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Sign out
  $('btn-signout').addEventListener('click', async () => {
    await db.auth.signOut();
    location.reload();
  });

  // New lead
  $('btn-new').addEventListener('click',()=>openModal('New Lead',{stage:'New Lead',product:PRODUCTS[0],source:SOURCES[0],size:SIZES[0]},async d=>{setLoading(true);await Store.add(d);setLoading(false);renderAll();}));

      if(action.dataset.action==='edit'){
        const l=Store.find(id); if(!l) return;
        openModal('Edit Lead',l,async d=>{setLoading(true);await Store.update({...l,...d});setLoading(false);if(App.selId===id)App.selId=id;renderAll();});
      } else if(action.dataset.action==='delete'){
        const l=Store.find(id); if(!l) return;
        showConfirm(`Delete "${l.company}"? This cannot be undone.`,async()=>{setLoading(true);if(App.selId===id)App.selId=null;await Store.del(id);setLoading(false);renderAll();});
      }
      return;
    }
    if(goto){
      App.selId=parseInt(goto.dataset.goto); App.view='leads'; renderAll(); return;
    }
    if(card&&card.dataset.id){
      const id=parseInt(card.dataset.id);
      App.selId=App.selId===id?null:id; renderAll();
    }
  });

  // Panel delegation (click)
  $('panel').addEventListener('click',async e=>{
    if(e.target.closest('[data-panel-close]')){ App.selId=null; renderAll(); return; }
    const mv=e.target.closest('[data-move]');
    if(mv&&App.selId){ setLoading(true);await Store.move(App.selId,mv.dataset.move);setLoading(false);renderAll(); return; }
    if(e.target.closest('[data-panel-edit]')&&App.sel){
      const l=App.sel; openModal('Edit Lead',l,async d=>{setLoading(true);await Store.update({...l,...d});setLoading(false);renderAll();}); return;
    }
    if(e.target.closest('[data-panel-del]')&&App.sel){
      const l=App.sel;
      showConfirm(`Delete "${l.company}"? This cannot be undone.`,async()=>{setLoading(true);await Store.del(App.selId);App.selId=null;setLoading(false);renderAll();}); return;
    }
    if(e.target.closest('[data-add-act]')){
      const txt=$('act-txt')?.value.trim(), type=$('act-type')?.value||'Note';
      if(txt&&App.selId){ setLoading(true);await Store.addAct(App.selId,type,txt);setLoading(false);renderAll(); }
    }
  });

  // Panel Enter key for activity
  $('panel').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&e.target.id==='act-txt'){ e.preventDefault(); $('panel').querySelector('[data-add-act]')?.click(); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if($('modal-ov').classList.contains('open')){ $('modal-ov').classList.remove('open'); return; }
      if($('cfm-ov').classList.contains('open')){ $('cfm-ov').classList.remove('open'); return; }
      if(App.selId){ App.selId=null; renderAll(); }
    }
    if(e.key==='n'&&!e.ctrlKey&&!e.metaKey&&e.target.tagName==='BODY')
      $('btn-new').click();
  });
}

// ════════════════════════════════════════════
// AUTH + BOOT
// ════════════════════════════════════════════
function showSignIn() {
  const gate = $('signin-gate');
  gate.style.display = 'flex';
  $('si-email').focus();

  const btn = $('si-btn');
  const err = $('si-err');

  const doSignIn = async () => {
    const email = $('si-email').value.trim();
    const pw    = $('si-pw').value;
    if (!email || !pw) return;
    btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';
    const { error } = await db.auth.signInWithPassword({ email, password: pw });
    if (error) {
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    } else {
      gate.style.display = 'none';
      await bootApp();
    }
  };

  btn.addEventListener('click', doSignIn);
  [$('si-email'), $('si-pw')].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); })
  );
}

async function bootApp() {
  setLoading(true);
  await Store.load();
  // Check admin status for current user
  const { data: { user } } = await db.auth.getUser();
  App.currentUser = user;
  if (user) {
    const { data: profile } = await db.from('profiles').select('role').eq('id', user.id).single();
    App.isAdmin = profile?.role === 'admin';
  }
  setLoading(false);
  init();
  renderAll();
}

// Handle password recovery / invite links (fires when user clicks email link)
db.auth.onAuthStateChange(async (event) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && _linkType === 'invite')) {
    const ov=$('modal-ov'), m=$('modal');
    m.innerHTML=`
      <div class="m-hd"><span class="m-title">Set Your Password</span></div>
      <div class="m-body">
        <div class="fl">
          <label class="flbl">New password</label>
          <input id="new-pw" class="fi" type="password" placeholder="At least 8 characters" autocomplete="new-password">
        </div>
      </div>
      <div class="m-ft">
        <button type="button" id="set-pw-btn" class="btn btn-primary" style="flex:1">Set Password &amp; Sign In</button>
      </div>`;
    ov.classList.add('open');
    document.getElementById('new-pw').focus();
    document.getElementById('set-pw-btn').addEventListener('click', async () => {
      const pw=document.getElementById('new-pw').value;
      if(pw.length<8){ showToast('Password must be at least 8 characters'); return; }
      const { error }=await db.auth.updateUser({ password: pw });
      ov.classList.remove('open');
      if(error){ showToast('Error: '+error.message); }
      else { showToast('Password set! Welcome to Prospera.'); await bootApp(); }
    });
  }
});

(async () => {
  // If arriving from an invite or reset link, let onAuthStateChange handle it
  if (_linkType === 'invite' || _linkType === 'recovery') return;
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    await bootApp();
  } else {
    showSignIn();
  }
})();
</script>
